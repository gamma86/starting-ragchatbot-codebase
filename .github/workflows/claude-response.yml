name: Claude Response

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Call Claude API and post response
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const https = require('https');

            const comment = context.payload.comment.body;
            const issueNumber = context.payload.issue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            const isPR = !!context.payload.pull_request;

            // Build context for Claude
            const title = context.payload.issue
              ? context.payload.issue.title
              : context.payload.pull_request.title;
            const body = context.payload.issue
              ? context.payload.issue.body
              : context.payload.pull_request.body;

            const systemPrompt = `You are a helpful GitHub assistant for the repository ${repoOwner}/${repoName}.
            You are responding to a comment in ${isPR ? 'a pull request' : 'an issue'}.
            Be concise and helpful. Format your response using GitHub Markdown.`;

            const userMessage = `${isPR ? 'Pull Request' : 'Issue'} title: ${title}
            ${isPR ? 'Pull Request' : 'Issue'} description: ${body || '(none)'}

            Comment mentioning you: ${comment}`;

            // Call Anthropic API
            const requestBody = JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1024,
              system: systemPrompt,
              messages: [{ role: 'user', content: userMessage }]
            });

            const claudeResponse = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'Content-Length': Buffer.byteLength(requestBody)
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(requestBody);
              req.end();
            });

            const responseText = claudeResponse.content[0].text;

            // Post response as a comment
            if (isPR && context.payload.pull_request) {
              await github.rest.pulls.createReviewComment({
                owner: repoOwner,
                repo: repoName,
                pull_number: issueNumber,
                body: `**@claude:** ${responseText}`
              }).catch(() =>
                github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  body: `**@claude:** ${responseText}`
                })
              );
            } else {
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber,
                body: `**@claude:** ${responseText}`
              });
            }
